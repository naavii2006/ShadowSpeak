<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>verify · anonymous</title>
    <style>
        /* ===== NGL / WHISPER INSPIRED DARK MODE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0c0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            color: #ffffff;
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
        }

        /* animated gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(147, 51, 234, 0.25);
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(59, 130, 246, 0.2);
            bottom: -200px;
            right: -200px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(236, 72, 153, 0.15);
            bottom: 30%;
            left: 20%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* subtle noise texture */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wMjUiIC8+PC9zdmc+');
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
        }

        /* main card — glassmorphic dark */
        .verify-card {
            background: rgba(18, 22, 28, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2.5rem 2.2rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05) inset, 0 0 40px rgba(147, 51, 234, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
            z-index: 10;
            position: relative;
            animation: card-appear 0.8s ease-out;
            text-align: center;
        }

        @keyframes card-appear {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .verify-card:hover {
            box-shadow: 0 40px 80px -15px #000, 0 0 0 1px rgba(147, 51, 234, 0.2) inset, 0 0 60px rgba(147, 51, 234, 0.3);
            border-color: rgba(147, 51, 234, 0.2);
        }

        /* icon with glow */
        .icon-circle {
            background: rgba(147, 51, 234, 0.15);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 0 30px rgba(147, 51, 234, 0.3);
            border: 1px solid rgba(147, 51, 234, 0.3);
            animation: pulse-glow 3s infinite;
        }

        .icon-circle span {
            font-size: 2.8rem;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(147, 51, 234, 0.3); }
            50% { box-shadow: 0 0 50px rgba(147, 51, 234, 0.6); }
        }

        h2 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #ffffff 0%, #c7b9ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(147, 51, 234, 0.5);
        }

        .email-hint {
            color: #9aa3b8;
            font-size: 1rem;
            margin-bottom: 2rem;
            padding: 0.7rem 1.2rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 60px;
            backdrop-filter: blur(5px);
            display: inline-block;
            border: 1px solid rgba(147, 51, 234, 0.15);
        }

        .email-hint span {
            color: #8b5cf6;
        }

        /* OTP form */
        .verify-form {
            margin: 2rem 0 1.2rem 0;
        }

        .otp-group {
            margin-bottom: 2.2rem;
        }

        label {
            display: block;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.6px;
            color: #8f9bb5;
            margin-bottom: 0.7rem;
            text-transform: uppercase;
        }

        .otp-input-wrapper {
            display: flex;
            justify-content: center;
        }

        input[name="otp"] {
            width: 100%;
            max-width: 280px;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(147, 51, 234, 0.2);
            border-radius: 60px;
            padding: 1.2rem 1.5rem;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.5rem;
            text-align: center;
            outline: none;
            transition: all 0.2s;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-family: 'Courier New', monospace;
        }

        input[name="otp"]:focus {
            border-color: #8b5cf6;
            background: rgba(20, 20, 30, 0.5);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.3), 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        input[name="otp"]::placeholder {
            font-size: 1rem;
            letter-spacing: normal;
            color: #4f5a6b;
            font-weight: 300;
            opacity: 0.7;
        }

        /* verify button — gradient glowing */
        .verify-btn {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border: none;
            border-radius: 60px;
            padding: 1.2rem 2rem;
            width: 100%;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 30px -10px #8b5cf6, 0 0 30px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 1.5rem 0 1.2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            position: relative;
            overflow: hidden;
        }

        .verify-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.7s;
        }

        .verify-btn:hover::before {
            left: 100%;
        }

        .verify-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 25px 40px -10px #8b5cf6, 0 0 50px rgba(139, 92, 246, 0.5);
        }

        .verify-btn:active {
            transform: translateY(1px);
        }

        /* resend line */
        .resend-info {
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #9aa3b8;
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem 1.5rem;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(147, 51, 234, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .resend-link {
            color: #c4b5fd;
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid rgba(139, 92, 246, 0.3);
            margin-left: 0.3rem;
            transition: 0.15s;
        }

        .resend-link:hover {
            border-bottom-color: #8b5cf6;
            color: #ffffff;
        }

        /* privacy note */
        .privacy-note {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #5d6b84;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            opacity: 0.7;
        }

        .privacy-note span {
            color: #8b5cf6;
        }

        /* floating messages (anonymous themed) */
        .float-message {
            position: fixed;
            background: rgba(30, 35, 45, 0.7);
            backdrop-filter: blur(10px);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(147, 51, 234, 0.2);
            color: #e2e8f0;
            font-size: 0.9rem;
            z-index: 5;
            animation: float-message 15s infinite linear;
            white-space: nowrap;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .float-1 {
            top: 15%;
            left: 5%;
            animation-delay: 0s;
        }

        .float-2 {
            bottom: 20%;
            right: 5%;
            animation-delay: -5s;
        }

        .float-3 {
            top: 40%;
            right: 8%;
            animation-delay: -10s;
        }

        @keyframes float-message {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.5; }
            25% { transform: translate(10px, -15px) rotate(2deg); opacity: 0.8; }
            50% { transform: translate(-5px, -25px) rotate(-1deg); opacity: 0.6; }
            75% { transform: translate(-15px, -10px) rotate(1deg); opacity: 0.7; }
            100% { transform: translate(0, 0) rotate(0deg); opacity: 0.5; }
        }

        @media (max-width: 450px) {
            .verify-card {
                padding: 2rem 1.5rem;
            }
            h2 {
                font-size: 2rem;
            }
            .icon-circle {
                width: 70px;
                height: 70px;
            }
            .icon-circle span {
                font-size: 2.2rem;
            }
            input[name="otp"] {
                font-size: 1.5rem;
                padding: 1rem;
            }
            .float-message {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- animated orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- floating anonymous messages -->
    <div class="float-message float-1">🔮 verifying your anonymity</div>
    <div class="float-message float-2">⚡ 6-digit code sent</div>
    <div class="float-message float-3">🕊️ almost there</div>

    <!-- main verify card -->
    <div class="verify-card">
        <!-- icon with glow -->
        <div class="icon-circle">
            <span>🔐</span>
        </div>

        <h2>verify</h2>
        <div class="email-hint">
            <span>📧</span> code sent to your email
        </div>

        <!-- main form -->
        <form class="verify-form" method="POST" action="/verify">
            <div class="otp-group">
                <label for="otp">verification code</label>
                <div class="otp-input-wrapper">
                    <input type="text" id="otp" name="otp" placeholder="6 digits" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" required>
                </div>
            </div>

            <button type="submit" class="verify-btn">
                <span>✓</span> verify identity
            </button>
        </form>

        <!-- resend option -->
        <div class="resend-info">
            <span>⏳</span> didn't receive it? <a href="/resend-otp" class="resend-link">resend code</a>
        </div>

        <!-- privacy reassurance -->
        <div class="privacy-note">
            <span>🔮</span> anonymous & encrypted <span>🔮</span>
        </div>
    </div>

    <!-- extra floating elements -->
    <div style="position: fixed; bottom: 20px; left: 20px; opacity:0.15; font-size: 2rem; pointer-events: none; z-index: 2;">💬</div>
    <div style="position: fixed; top: 20px; right: 30px; opacity:0.1; font-size: 3rem; pointer-events: none; z-index: 2;">🌙</div>

</body>
</html>
