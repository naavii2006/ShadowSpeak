<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Edit Post • Whisper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <style>
        /* Mobile Responsive Fixes */
@media (max-width: 768px) {
    /* Posts take full width */
    .post-card, .create-card, .navbar, .search-container {
        margin: 8px auto;
    }
    
    /* Smaller fonts on mobile */
    .post-username, .caption-username {
        font-size: 13px;
    }
    
    .post-time, .comment-time {
        font-size: 10px;
    }
    
    /* Touch-friendly buttons */
    .action-btn {
        padding: 12px;
        font-size: 28px;
    }
    
    /* Better spacing for comments */
    .comment-item {
        gap: 8px;
    }
    
    .comment-avatar {
        width: 28px;
        height: 28px;
        font-size: 14px;
    }
    
    /* Navigation icons smaller on mobile */
    .nav-icons {
        gap: 12px;
    }
    
    .nav-icons a {
        font-size: 20px;
    }
    
    /* Stories row adjustments */
    .story-ring {
        width: 60px;
        height: 60px;
    }
    
    .story-inner {
        width: 56px;
        height: 56px;
        font-size: 28px;
    }
    
    .story-name {
        font-size: 10px;
    }
    
    /* Search bar adjustments */
    .search-bar {
        padding: 6px 12px;
    }
    
    .search-bar input {
        font-size: 14px;
    }
    
    /* Modal adjustments */
    .modal-content {
        width: 95%;
        padding: 20px;
        margin: 10px;
    }
    
    /* Toast notifications */
    .toast-message {
        bottom: 20px;
        left: 16px;
        right: 16px;
        transform: none;
        width: auto;
        font-size: 13px;
    }
}

/* Extra small devices (phones under 400px) */
@media (max-width: 480px) {
    .post-header {
        padding: 10px 12px;
    }
    
    .post-avatar {
        width: 32px;
        height: 32px;
        font-size: 16px;
    }
    
    .post-content {
        font-size: 13px;
        padding: 0 12px 10px 12px;
    }
    
    .post-actions {
        padding: 4px 12px;
        gap: 12px;
    }
    
    .action-btn {
        padding: 8px;
        font-size: 24px;
    }
    
    .comments-section {
        padding: 8px 12px;
    }
    
    .add-comment {
        padding: 8px 12px;
    }
    
    .add-comment input {
        padding: 8px 12px;
        font-size: 13px;
    }
    
    .create-header {
        gap: 8px;
    }
    
    .create-avatar {
        width: 32px;
        height: 32px;
        font-size: 16px;
    }
    
    .create-input {
        padding: 8px 12px;
        font-size: 14px;
    }
    
    /* Stack profile stats on mobile */
    .profile-stats {
        gap: 20px;
    }
    
    .stat-number {
        font-size: 20px;
    }
}

/* Fix for tap highlights on mobile */
.action-btn, .create-input, .story, .post-menu, .dropdown-item {
    -webkit-tap-highlight-color: transparent;
}

/* Better touch targets for dropdown */
.dropdown-item {
    padding: 14px 16px;  /* Larger touch area */
}

/* Fix for fixed positioning on mobile */
.navbar {
    position: sticky;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
}

/* Ensure content doesn't go under navbar */
body {
    padding-top: 0;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            line-height: 1.5;
        }

        .navbar {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            z-index: 100;
        }

        .nav-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: white;
            text-decoration: none;
            font-size: 24px;
        }

        .edit-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .edit-card {
            background: #121212;
            border-radius: 24px;
            border: 1px solid #262626;
            overflow: hidden;
        }

        .edit-header {
            padding: 20px 24px;
            border-bottom: 1px solid #262626;
        }

        .edit-header h2 {
            font-size: 24px;
            font-weight: 600;
        }

        .edit-header p {
            font-size: 13px;
            color: #8e8e8e;
            margin-top: 4px;
        }

        .edit-form {
            padding: 24px;
        }

        textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #363636;
            border-radius: 16px;
            padding: 16px;
            font-family: inherit;
            font-size: 16px;
            color: white;
            resize: vertical;
            min-height: 200px;
            outline: none;
        }

        textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        }

        .char-counter {
            text-align: right;
            font-size: 12px;
            color: #6a6a6a;
            margin-top: 8px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .save-btn {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        .cancel-btn {
            flex: 1;
            background: #262626;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-container">
            <div class="logo">✨ whisper</div>
            <a href="/feed" class="back-link">✕</a>
        </div>
    </div>

    <div class="edit-container">
        <div class="edit-card">
            <div class="edit-header">
                <h2>✏️ Edit Post</h2>
                <p>Make changes to your anonymous confession</p>
            </div>

            <form class="edit-form" method="POST">
                <textarea id="content" name="content" maxlength="2000" required>{{ post.content }}</textarea>
                <div class="char-counter">
                    <span id="char-count">{{ post.content|length }}</span> / 2000 characters
                </div>

                <div class="button-group">
                    <a href="/feed" class="cancel-btn">Cancel</a>
                    <button type="submit" class="save-btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('content');
        const charCount = document.getElementById('char-count');

        textarea.addEventListener('input', function() {
            charCount.textContent = this.value.length;
        });
    </script>

</body>
</html>
